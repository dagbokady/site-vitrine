<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet — Mc.Johnson & Partners</title>
    <meta name="description" id="meta-description" content="Détail d'un projet de Mc.Johnson & Partners.">

    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/project-page.css">

    <link rel="icon" type="image/png" href="/images/ui/favicon.png">
</head>

<body class="project-body">

<!-- HEADER FLOTTANT (fond change selon la section visible) -->
<header class="project-header" id="project-header">
    <div class="project-header-inner">
        <a href="/" class="logo" aria-label="Retour à l'accueil">
            <span class="logo-text">Mc.JOHNSON &amp; <span class="logo-accent">Partners</span></span>
        </a>

        <div class="project-header-center" id="project-header-center" hidden>
            <p class="header-discipline" id="header-discipline"></p>
            <p class="header-title" id="header-title"></p>
        </div>

        <nav class="project-nav-top" aria-label="Navigation">
            <a href="/" class="project-nav-link">Tous les projets</a>
            <a href="/agence" class="project-nav-link">Agence</a>
            <a href="/contact" class="project-nav-link">Contact</a>
        </nav>
    </div>
</header>

<!-- INDICATEUR DE SECTION (à droite, façon Apple) -->
<aside class="section-indicator" id="section-indicator" hidden aria-hidden="true">
    <ul class="indicator-list" id="indicator-list">
        <!-- rempli par JS : 1 dot par section -->
    </ul>
</aside>

<!-- LOADING -->
<div class="project-loading" id="project-loading">
    <p>Chargement…</p>
</div>

<!-- ERREUR : projet introuvable -->
<section class="project-error" id="project-error" hidden>
    <div class="project-error-content">
        <p class="eyebrow">Erreur</p>
        <h1>Projet introuvable</h1>
        <p>Le projet que vous cherchez n'existe pas ou a été déplacé.</p>
        <a href="/" class="btn btn-primary">Retour à l'accueil</a>
    </div>
</section>

<!-- CONTENEUR DES SECTIONS (rempli par project-page.js) -->
<main class="project-snap" id="project-snap" hidden>
    <!-- Les sections sont injectées dynamiquement -->
</main>

<!-- NAVIGATION INTER-PROJETS (en bas de la dernière section) -->
<nav class="project-end" id="project-end" hidden aria-label="Suite">
    <div class="project-end-inner">
        <a href="#" class="project-end-link" id="project-prev" hidden>
            <span class="end-label">← Précédent</span>
            <span class="end-title" id="project-prev-title"></span>
        </a>
        <a href="/" class="project-end-link end-center">
            <span class="end-label">Tous les projets</span>
        </a>
        <a href="#" class="project-end-link end-right" id="project-next" hidden>
            <span class="end-label">Suivant →</span>
            <span class="end-title" id="project-next-title"></span>
        </a>
    </div>
</nav>

<script src="/js/main.js"></script>
<script src="/js/project-page.js"></script>
</body>
</html>
