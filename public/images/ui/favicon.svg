<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <!-- Fond noir avec coins légèrement arrondis -->
    <rect width="64" height="64" rx="8" fill="#0A0A0A"/>

    <!-- "McJ" centré en blanc, police épaisse style logo -->
    <text x="32" y="42"
          font-family="Inter, Helvetica, Arial, sans-serif"
          font-weight="900"
          font-size="28"
          fill="#FFFFFF"
          text-anchor="middle"
          letter-spacing="-1">McJ</text>

    <!-- Barre orange dessous (rappel du logo) -->
    <rect x="14" y="50" width="36" height="3.5" fill="#E63A11"/>
</svg>